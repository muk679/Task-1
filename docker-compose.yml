version: "3.8"

services:

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"

  express-api:
    build: ./express-api
    container_name: express-api
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  node-backend:
    build: ./backend
    container_name: node-backend
    ports:
      - "4000:4000"
    depends_on:
      - mongodb

  react-frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:80"

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: legacydb
    ports:
      - "3306:3306"

  apache-php:
    build: ./lamp
    container_name: apache-php
    ports:
      - "8080:80"
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: reverse-proxy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - react-frontend
      - apache-php